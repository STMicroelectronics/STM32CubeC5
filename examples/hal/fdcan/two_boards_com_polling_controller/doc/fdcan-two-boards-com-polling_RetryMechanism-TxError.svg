@startuml doc/FDCAN-two-boards-com-polling_NominalCase.svg
'generate svg file with:
'cube plantuml -tsvg internal/FDCAN_2Bcom_polling_Controller_MSC.puml

' style
skinparam backgroundColor #EEEBDC
skinparam ParticipantPadding 20
skinparam ParticipantFontSize 12
skinparam BoxPadding 20
skinparam backgroundColor #EEEBDC
skinparam dpi 300

skinparam sequence {
	ArrowColor black
	ActorBorderColor DeepSkyBlue
	LifeLineBorderColor black
	LifeLineBackgroundColor #A9DCDF
	ArrowThickness 1
}

' chart
title  **Nominal FDCAN communication in polling mode**

box "Controller Board"
	participant "Example" as CtrlEx #lightgreen
	participant "HAL FDCAN Driver" as CtrlHAL #lightblue
end box
box "Responder Board"
	participant "Example" as RespEx #lightgreen
end box


== example.c /app_init() ==
skinparam NoteFontSize 10
note right CtrlEx
	Step 1: initializes the FDCAN instance.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_RCC_FDCAN1_SetKernelClkSource()</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_Init()</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_SetConfig()</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
'add some spacing in the diagram
|||

note right CtrlEx
	Step 2: configures FDCAN filter then start FDCAN.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_SetFilter()</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_Start()</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>


== example.c /app_process() ==

note right CtrlEx
	Step 3: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_RequestTransmitMessage()</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> Send data over FDCAN</size>

'add some spacing in the diagram
|||

note right CtrlEx
	Step 4: receives the buffer back in polling mode.
endnote
CtrlHAL o<<[#black]- RespEx   : <size:11> Receive data over FDCAN</size>
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_GetRxFifoFillLevel()</size>
CtrlEx <- - CtrlHAL            : <size:11> At least a frame in Fifo</size>
'add some spacing in the diagram
|||

CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_GetReceivedMessage()</size>
CtrlEx <- - CtrlHAL            : <size:11> HAL_OK</size>
'add some spacing in the diagram
|||

note right CtrlEx
	Step 5: checks that the sent and received buffers match.
endnote
CtrlEx -[#black]> CtrlEx      : <size:12> HandleTransferCplt()</size>

== main.c /main() ==
note right CtrlEx
	reports the success status by turning on the status led.
endnote

newpage Retry mechanism in case of a data transmission error

== example.c /app_process() ==
note right CtrlEx
Step 3: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL     : <size:12> HAL_FDCAN_RequestTransmitMessage()
CtrlHAL -> CtrlHAL  : <size:11> TX Fifo full
CtrlEx <- - CtrlHAL    : <size:11> HAL_ERROR
'add some spacing in the diagram
|||
CtrlEx -> CtrlHAL     : <size:12>HAL_FDCAN_GetLastErrorCodes()
CtrlEx <- - CtrlHAL    : <size:11> HAL_FDCAN_ERROR_TX_FIFO_FULL
'add some spacing in the diagram
|||
note right CtrlEx
**Failure during the FDCAN transmission process**
**Restart** Step 3: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_RequestTransmitMessage()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> Send data over FDCAN</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>


newpage Retry mechanism in case of a data reception error

== example.c /app_process() ==
note right CtrlEx
	Step 3: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_RequestTransmitMessage()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> Send data over FDCAN</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>

'add some spacing in the diagram
|||

note right CtrlEx
	Step 4: receives the buffer back in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_GetRxFifoFillLevel()</size>
CtrlEx <- - CtrlHAL            : <size:11> No frame in Fifo</size>
'add some spacing in the diagram
|||
 CtrlEx -> CtrlHAL     : <size:12>HAL_FDCAN_GetLastErrorCodes()
CtrlEx <- - CtrlHAL    : <size:11> RX Fifo empty
'add some spacing in the diagram
|||
note right CtrlEx
**Failure during the FDCAN reception process**
**Restart** Step 3: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_RequestTransmitMessage()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> Send data over FDCAN</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
'add some spacing in the diagram
|||
note right CtrlEx
**Restart** Step 4: receives the buffer back in polling mode.
endnote
CtrlHAL o<<[#black]- RespEx   : <size:11> Receive data over FDCAN</size>
CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_GetRxFifoFillLevel()</size>
CtrlEx <- - CtrlHAL            : <size:11> At least one frame in RxFifo</size>
'add some spacing in the diagram
|||

CtrlEx -> CtrlHAL             : <size:12> HAL_FDCAN_GetReceivedMessage()</size>
CtrlEx <- - CtrlHAL            : <size:11> HAL_OK</size>
'add some spacing in the diagram
|||

