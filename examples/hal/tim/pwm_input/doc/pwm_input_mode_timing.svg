@startuml{pwm_input_mode_timing.svg}
Title   PWM input timing
legend
PWM input configured in combined reset and trigger mode
end legend
' caption PWM input configured in combined reset and trigger mode
hide time-axis


binary     "External Signal tim_tix"  as TI
concise  "TIMx_CNT"   as CNT
concise "TIMx_CCRx"  as CCRX
concise "TIMx_CCRx" as CCRY

@0
TI   is 0
CNT  is 0000
CCRX is 0000
CCRY is 0000
@50

@100
TI   is 1
CNT  is 0000
CCRX is 0000
CCRY is 0000
note bottom of CCRY: ICx capture \nReset TIMx counter
TI -> CNT@+20: Reset
TI -> CCRX@+20: Capture

@200
CNT  is 0001

@300
CNT  is 0002

@400
TI   is 0
CNT  is 0003
CCRY is 0002

note bottom of CCRY: ICy capture \nUsed for Duty Cycle\nMeasurement
TI -> CCRY@+20: Capture

@500
CNT  is 0004

@600
TI   is 1
CNT  is 0000
CCRX is 0004
note bottom of CCRY: ICx capture \nReset TIMx counter\nUsed for Frequency\nMeasurement
TI -> CNT@+20: Reset
TI -> CCRX@+20: Capture

@700
CNT  is ""

@enduml

