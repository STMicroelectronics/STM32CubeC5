@startuml
Title 2 phase-shifted PWM signals with 50% dutcy cycle

hide footbox
hide time-axis

concise "Counter register" as CNT
binary "tim_oc1refc\n" as OC1
binary "tim_oc3refc\n" as OC3

@0
CNT is 0
OC1 is 0
OC3 is 0

@1
CNT is 1

@2
CNT is 2

@3
CNT is 3
OC3 is 1

@4
CNT is 4

@5
CNT is 5


@6
