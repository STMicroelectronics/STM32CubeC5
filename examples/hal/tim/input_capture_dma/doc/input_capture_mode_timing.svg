b45b4d8d]
@startuml
Title   input capture timing
legend
Input capture configured in trigger mode
end legend
' caption input capture configured in trigger mode
hide time-axis

binary "External Signal tim_tix" as TI
concise "TIMx_CNT" as CNT
concise "TIMx_CCRx" as CCRX

@0
TI is 0
CNT is 0003
CCRX is 0000
@50

@100
TI is 1
CNT is 0004
CCRX is 0000
TI -> CCRX@+20: Capture

@200
CNT is 0005

@300
CNT is 0006

@400
TI is 0
CNT is 0007

@500
CNT is 0008

@600
TI is 1
CNT is 0009
CCRX is 0005
note bottom of CCRX: ICx capture \nperiod \nMeasurement\n(CCRX = 0008 - 0003)
TI -> CCRX@+20: Capture

@700
CNT is ""
@enduml

