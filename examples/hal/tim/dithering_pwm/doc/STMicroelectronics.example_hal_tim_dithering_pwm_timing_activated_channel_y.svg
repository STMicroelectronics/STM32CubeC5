@startuml
Title Dithering PWM Signal Timing
legend
Dithering PWM mode activated
end legend

hide time-axis

robust "CHANNEL_Y" as CH1

@-0
CH1 is low

@1
CH1 is high
@1.25
CH1 is low

@17
CH1 is high
@17.25
CH1 is low

@1 <-> @17 : 16 periods
@enduml

