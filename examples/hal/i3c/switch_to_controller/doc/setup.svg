<svg width="700" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Outer rectangles -->
  <rect x="10" y="10" width="180" height="280" rx="10" ry="10" fill="white" stroke="black" />
  <rect x="370" y="10" width="180" height="280" rx="10" ry="10" fill="white" stroke="black" />

  <!-- Left blue block -->
  <rect x="30" y="30" width="160" height="130" rx="5" ry="5" fill="#4DB8FF" stroke="black" />
  <text x="40" y="55" font-weight="bold" font-size="14">STM32 I3Ci</text>

  <!-- Left block labels -->
  <text x="120" y="90" font-size="14">I3Ci_SCL</text>
  <text x="120" y="130" font-size="14">I3Ci_SDA</text>

  <!-- Right blue block -->
  <rect x="370" y="30" width="160" height="130" rx="5" ry="5" fill="#4DB8FF" stroke="black" />
  <text x="440" y="55" font-weight="bold" font-size="14">STM32 I3Ci</text>

  <!-- Right block labels -->
  <text x="380" y="90" font-size="14">I3Ci_SCL</text>
  <text x="380" y="130" font-size="14">I3Ci_SDA</text>
  <!-- Lines connecting SCL -->
  <line x1="190" y1="85" x2="370" y2="85" stroke="black" />
  <!-- Lines connecting SDA -->
  <line x1="190" y1="125" x2="370" y2="125" stroke="black" />
  <!-- Lines connecting GND -->
  <line x1="190" y1="200" x2="370" y2="200" stroke="black" />

  <!-- GND labels -->
  <text x="150" y="200" font-weight="bold" font-size="14">GND</text>
  <text x="380" y="200" font-weight="bold" font-size="14">GND</text>

  <!-- Bottom left text -->
  <text x="40" y="250" font-weight="bold" font-size="14">STM32 MCU on</text>
  <text x="40" y="270" font-weight="bold" font-size="14">Controller board</text>

  <!-- Bottom right text -->
  <text x="420" y="250" font-weight="bold" font-size="14">STM32 MCU on</text>
  <text x="420" y="270" font-weight="bold" font-size="14">target board</text>

</svg>