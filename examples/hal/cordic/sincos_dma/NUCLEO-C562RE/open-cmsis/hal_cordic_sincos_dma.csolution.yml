# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/schemas/projmgr/2.11.0/tools/projmgr/schemas/csolution.schema.json
solution:
  target-types:
    - type: NUCLEO-C562RE
      device: STM32C562RET6
      define:
        - USE_EXTERNAL_ENV
  output-dirs:
    outdir: $ProjectDir()$/build/$BuildType$
    tmpdir: project/tmp
  generators:
    base-dir: $ProjectDir()$/generated
    options:
      - generator: stm32c5xx_hal_mx2codegen
        path: ../generated/hal
      - generator: led_mx2codegen
        path: $SolutionDir()$/../generated/parts
  build-types:
    - type: release_AC6
      compiler: AC6
    - type: debug_AC6
      compiler: AC6
    - type: release_GCC
      compiler: GCC
    - type: debug_GCC
      compiler: GCC
    - type: release_IAR
      compiler: IAR
    - type: debug_IAR
      compiler: IAR
  packs:
    - pack: STMicroelectronics::CMSIS
      path: ../../../../../../arch/cmsis
    - pack: STMicroelectronics::CMSIS-DSP
      path: ../../../../../../arch/cmsis_dsp
    - pack: STMicroelectronics::led_part_drivers
      path: ../../../../../../part_drivers/led
    - pack: STMicroelectronics::stm32c5xx_dfp
      path: ../../../../../../stm32c5xx_dfp
    - pack: STMicroelectronics::stm32c5xx_hal_drivers
      path: ../../../../../../stm32c5xx_drivers
    - pack: STMicroelectronics::syscalls
      path: ../../../../../../utilities/syscalls
  projects:
    - project: project/hal_cordic_sincos_dma.cproject.yml
