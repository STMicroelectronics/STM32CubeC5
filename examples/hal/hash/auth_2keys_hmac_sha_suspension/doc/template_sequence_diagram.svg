@startuml img/plantuml_template_sequence_diagram
'===================
' style
'===================
participant "User Application" as User_Application #39A9DC
participant "HAL HASH Driver"  as HAL_HASH_Driver  #39A9DC
participant "HAL Timer Driver" as HAL_Timer_Driver #39A9DC

' Fix order of each column
== Initialization ==
User_Application->HAL_HASH_Driver :HAL_HASH_Init()
User_Application->HAL_Timer_Driver :HAL_TIM_Init()
User_Application->HAL_Timer_Driver :HAL_TIM_Start_IT()
== Configuration ==
User_Application->HAL_HASH_Driver :HAL_HASH_SetConfig()
== Starts compute the message ==

User_Application->HAL_HASH_Driver :  HAL_HASH_HMAC_Compute_IT()

== Suspends the IT Computation process ==

User_Application->HAL_HASH_Driver :  HAL_HASH_RequestSuspendComputation()
note right: ** HASH computation suspended after calling the HAL_TIM_UpdateCallback when timer trig the callback.

HAL_HASH_Driver - -> User_Application: SuspendCallback()
User_Application->HAL_HASH_Driver :  HAL_HASH_SaveContext()
note right: ** Save parameters of the suspended HASH Computation
== Starts another process :Compute in poling mode ==
User_Application->HAL_HASH_Driver :  HAL_HASH_HMAC_Compute()
note right: ** MAC generation and verification using SHA256 in polling mode  **
...

== Resume the IT Computation ==
User_Application->HAL_HASH_Driver :  HAL_HASH_RestoreContext()
User_Application->HAL_HASH_Driver :  HAL_HASH_ResumeComputation()
note right: ** The previous interrupt is resumed  **
HAL_HASH_Driver - -> User_Application: DigestCpltCallback() \n ErrorCallback()

== Deinitializatio==
User_Application->HAL_HASH_Driver :  HAL_HASH_DeInit()
User_Application->HAL_HASH_Driver :  HAL_TIM_DeInit()




@enduml

