@startuml SMBUS-two-boards-com-it_RetryMechanism-TxError.svg
' style
skinparam backgroundColor #EEEBDC
skinparam ParticipantPadding 20
skinparam ParticipantFontSize 12
skinparam BoxPadding 20
skinparam backgroundColor #EEEBDC
skinparam dpi 300

skinparam sequence {
	ArrowColor black
	ActorBorderColor DeepSkyBlue
	LifeLineBorderColor black
	LifeLineBackgroundColor #A9DCDF
	ArrowThickness 1
}

' chart
title   **Retry mechanism in case of a data transmission error**

box "Controller Board"
    participant "Example" as CtrlEx #LightGreen
    participant "HAL SMBUS Driver" as CtrlHAL #LightBlue
end box

box "Target Board"
    participant "Example" as RespEx #LightGreen
end box

== example.c /app_process() ==
note right CtrlEx
    Step 2: transmits a buffer in a non-blocking mode using interrupt.
endnote
CtrlEx -> CtrlHAL       : <size:12> HAL_SMBUS_MASTER_SEQ_Transmit_IT() </size>
CtrlEx <- - CtrlHAL      : <size:12> HAL_OK </size>
CtrlHAL ->>x RespEx     : <size:12> data transmission </size>
note right CtrlEx
    Step 3: waits for the I2C interrupt: write transfer completed.
endnote
CtrlEx -/ CtrlEx        : <size:12> wait end transmission </size>
activate CtrlEx
CtrlHAL <<-o RespEx    : <size:12> NACK or timeout </size>
note right CtrlHAL
    The transfer error interrupt is raised.
end note
CtrlHAL -> CtrlEx       : <size:12> HAL_SMBUS_ErrorCallback() </size>
deactivate CtrlEx

'add some spacing in the diagram
|||
note right CtrlEx
**Failure during the I2C transmission process**
**Restart** Step 2: transmits a buffer in a non-blocking mode using interrupt.
endnote

CtrlEx -> CtrlHAL       : <size:12> HAL_SMBUS_MASTER_SEQ_Transmit_IT() </size>
CtrlEx <- - CtrlHAL      : <size:12> HAL_OK </size>
CtrlHAL ->>o RespEx : <size:12> data transmission </size>
CtrlEx -/ CtrlEx    : <size:12> wait end transmission</size>
activate CtrlEx
CtrlHAL <<-o RespEx : <size:12> ACK </size>
CtrlHAL -> CtrlEx   : <size:12> HAL_SMBUS_MASTER_TxCpltCallback() </size>
deactivate CtrlEx

@enduml

