@startuml
skinparam backgroundColor #EEEBDC
skinparam ParticipantPadding 20
skinparam BoxPadding 20
skinparam dpi 300

skinparam sequence {
	ArrowColor blue
	ActorBorderColor DeepSkyBlue
	LifeLineBorderColor blue
	LifeLineBackgroundColor #A9DCDF
	ArrowThickness 2
}

title  **Ethernet Communication**

box "Application Board_1"
  participant "Example" as AppEx #lightgreen
  participant "HAL ETH Driver" as AppHAL #lightblue
  participant "ETH_IRQHandler" as AppIRQ
end box
box "Application Board_2"
  participant "Example" as STM32#lightgreen
end box

== Initialization: app_init() ==
activate AppEx
  note right AppEx
    The application initializes the Ethernet peripheral and PHY.
  endnote

== app_process() ==
note right AppEx
  The application runs periodically, sending frames and processing received data.
endnote

group Transmit SYNC frame
	AppEx -> AppHAL : Send "SYNC:nn" every ETH_TRANSMIT_INTERVAL_MS
	activate AppHAL
	AppHAL -[#black]>>o STM32 : data over ETHERNET
	AppIRQ o-> AppHAL  : ETH Transfer complete
	AppHAL -> AppEx : release Tx packet
	deactivate AppHAL
end

group Process received frames
	STM32 o-[#black]>> AppIRQ : data over ETHERNET
	AppIRQ o-> AppHAL  : ETHReception complete
	activate AppHAL
	AppHAL -> AppEx : Print source MAC & payload
	AppEx -> AppHAL : Release rx buffer
	deactivate AppHAL
end
@enduml

