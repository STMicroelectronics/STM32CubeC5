@startuml doc/i2C-two-boards-com-polling_NominalCase.svg
' style
skinparam backgroundColor #EEEBDC
skinparam ParticipantPadding 20
skinparam BoxPadding 20
skinparam backgroundColor #EEEBDC
skinparam dpi 300

skinparam sequence {
	ArrowColor black
	ActorBorderColor DeepSkyBlue
	LifeLineBorderColor black
	LifeLineBackgroundColor #A9DCDF
	ArrowThickness 1
}

' chart
title  **Nominal I2C communication in polling mode**


box "Responder Board"
	participant "Example" as RespEx #lightgreen
  participant "HAL I2C Driver" as RespHAL #lightblue
end box
box "Controller Board"
	participant "Example" as CtrlEx #lightgreen
end box

== example.c /app_init() ==
skinparam NoteFontSize 10
note right RespEx
	Step 1: initializes the I2C instance.
endnote

'add some spacing in the diagram
|||

== example.c /app_process() ==
note right RespEx
	Step 2: receives a buffer, from the controller, in polling mode.
endnote
RespEx -> RespHAL             : <size:12> HAL_I2C_SLAVE_Receive()</size>
CtrlEx -[#black]>>o RespHAL    : <size:11> data over I2C</size>
RespEx  <- - RespHAL           : <size:11> HAL_OK</size>

'add some spacing in the diagram
|||

note right RespEx
	Step 3: transmits the received buffer in polling mode.
endnote
RespEx -> RespHAL             : <size:12> HAL_I2C_SLAVE_Transmit()</size>
RespHAL -[#black]>>o CtrlEx    : <size:11> data over I2C</size>
RespEx  <- - RespHAL           : <size:11> HAL_OK</size>

'add some spacing in the diagram
|||
== main.c /main() ==
note right RespEx
	reports the success status by turning on the user led.
endnote


newpage Retry mechanism in case of a data reception error

== example.c /app_process() ==
note right RespEx
	Step 2: receives a buffer, from the controller, in polling mode.
endnote
RespEx -> RespHAL            : <size:12> HAL_I2C_SLAVE_Receive()</size>
CtrlEx x->>x RespHAL         : <size:11> data not received or not acknowledged
RespEx <- - RespHAL           : <size:11> (HAL_ERROR | HAL_BUSY | ...)

'add some spacing in the diagram
|||
RespEx -> RespHAL     : <size:12>HAL_I2C_GetLastErrorCodes()
RespEx <- - RespHAL    : <size:11> (HAL_I2C_ERROR_BERR | _SIZE | ...)

'add some spacing in the diagram
|||
note right RespEx
**Failure during the I2C reception process**
**Restart** Step 2: receives a buffer, from the controller, in polling mode.
endnote
RespEx -> RespHAL             : <size:12> HAL_I2C_SLAVE_Receive()</size>
CtrlEx -[#black]>>o RespHAL    : <size:11> data over I2C</size>
RespEx  <- - RespHAL           : <size:11> HAL_OK</size>


newpage Retry mechanism in case of a data transmission error

