@startuml doc/i2C-two-boards-com-polling_NominalCase.svg
' style
skinparam backgroundColor #EEEBDC
skinparam ParticipantPadding 20
skinparam ParticipantFontSize 12
skinparam BoxPadding 20
skinparam backgroundColor #EEEBDC
skinparam dpi 300

skinparam sequence {
	ArrowColor black
	ActorBorderColor DeepSkyBlue
	LifeLineBorderColor black
	LifeLineBackgroundColor #A9DCDF
	ArrowThickness 1
}

' chart
title  **Nominal I2C communication in polling mode**

box "Controller Board"
	participant "Example" as CtrlEx #lightgreen
	participant "HAL I2C Driver" as CtrlHAL #lightblue
end box
box "Responder Board"
	participant "Example" as RespEx #lightgreen
end box


== example.c /app_init() ==
skinparam NoteFontSize 10
note right CtrlEx
	Step 1: initializes the I2C instance.
endnote

== example.c /app_process() ==
note right CtrlEx
	Step 2: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Transmit()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> data over I2C</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>

'add some spacing in the diagram
|||

note right CtrlEx
	Step 3: receives the buffer back in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Receive()</size>
CtrlHAL o<<[#black]- RespEx   : <size:11> data over I2C</size>
CtrlEx <- - CtrlHAL            : <size:11> HAL_OK</size>

'add some spacing in the diagram
|||

note right CtrlEx
	Step 4: checks that the sent and received buffers match.
endnote
CtrlEx -[#black]> CtrlEx      : <size:12> HandleTransferCplt()</size>

== main.c /main() ==
note right CtrlEx
	reports the success status by turning on the user led.
endnote

newpage Retry mechanism in case of a data transmission error

== example.c /app_process() ==
note right CtrlEx
	Step 2: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL     : <size:12> HAL_I2C_Master_Transmit()
CtrlHAL x->>x RespEx : <size:11> data not sent or not acknowledged
CtrlEx <- - CtrlHAL           : <size:11> (HAL_ERROR | HAL_BUSY | ...)
'add some spacing in the diagram
|||
CtrlEx -> CtrlHAL     : <size:12>HAL_I2C_GetLastErrorCodes()
CtrlEx <- - CtrlHAL    : <size:11> (HAL_I2C_ERROR_AF | _BERR | _SIZE | ...)
'add some spacing in the diagram
|||
note right CtrlEx
**Failure during the I2C transmission process**
**Restart** Step 2: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Transmit()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> data over I2C</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>


newpage Retry mechanism in case of a data reception error

