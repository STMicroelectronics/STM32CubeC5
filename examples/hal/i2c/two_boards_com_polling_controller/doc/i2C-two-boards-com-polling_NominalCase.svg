endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Transmit()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> data over I2C</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>

'add some spacing in the diagram
|||

note right CtrlEx
	Step 3: receives the buffer back in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Receive()</size>
CtrlHAL x->>x RespEx          : <size:11> data not received or not acknowledged
CtrlEx <- - CtrlHAL           : <size:11> (HAL_ERROR | HAL_BUSY | ...)
'add some spacing in the diagram
|||
 CtrlEx -> CtrlHAL     : <size:12>HAL_I2C_GetLastErrorCodes()
CtrlEx <- - CtrlHAL    : <size:11> (HAL_I2C_ERROR_AF | _BERR | _SIZE | ...)
'add some spacing in the diagram
|||
note right CtrlEx
**Failure during the I2C reception process**
**Restart** Step 2: transmits a buffer in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Transmit()</size>
CtrlHAL -[#black]>>o RespEx   : <size:11> data over I2C</size>
CtrlEx  <- - CtrlHAL           : <size:11> HAL_OK</size>
'add some spacing in the diagram
|||
note right CtrlEx
**Restart** Step 3: receives the buffer back in polling mode.
endnote
CtrlEx -> CtrlHAL             : <size:12> HAL_I2C_Master_Receive()</size>
CtrlHAL o<<[#black]- RespEx   : <size:11> data over I2C</size>
CtrlEx <- - CtrlHAL            : <size:11> HAL_OK</size>

