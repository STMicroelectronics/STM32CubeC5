<svg width="940" height="180" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="14">
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <!-- MCU container -->
  <rect x="180" y="20" width="600" height="140" fill="white" stroke="black" stroke-width="1"/>
  <text x="190" y="40" font-weight="bold" font-size="16">MCU</text>

  <!-- External Clock block -->
  <rect x="20" y="100" width="130" height="35" fill="white" stroke="black" stroke-width="1" rx="3" ry="3"/>
  <text x="35" y="125" font-weight="normal" font-size="14">External Clock</text>

  <!-- External Clock to MCU arrow -->
  <line x1="150" y1="120" x2="180" y2="120" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RCC block -->
  <rect x="280" y="55" width="100" height="45" fill="white" stroke="black" stroke-width="1" rx="3" ry="3"/>
  <text x="290" y="80" font-weight="bold" font-size="14">RCC</text>
  <text x="350" y="90" font-weight="normal" font-size="14">LSI</text>

  <!-- RCC to STM32 LPTIMi arrow -->
  <line x1="380" y1="90" x2="430" y2="90" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="430" cy="90" r="4" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- GPIO line -->
  <line x1="180" y1="120" x2="430" y2="120" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="180" cy="120" r="4" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="185" y="140" font-weight="normal" font-size="14">GPIO</text>

  <!-- STM32 LPTIMi block -->
  <rect x="430" y="45" width="280" height="90" fill="white" stroke="black" stroke-width="1" rx="3" ry="3"/>
  <text x="445" y="70" font-weight="bold" font-size="16">STM32 LPTIMi</text>
  <text x="445" y="95" font-weight="bold" font-size="14">Internal Clock</text>
  <text x="445" y="120" font-weight="bold" font-size="14">Input Pin</text>
  <text x="620" y="120" font-weight="bold" font-size="14">Channel</text>

  <!-- STM32 LPTIMi to Output PWM arrow -->
  <line x1="710" y1="90" x2="750" y2="90" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="710" cy="90" r="4" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Output PWM block (resized) -->
  <rect x="750" y="70" width="160" height="80" fill="white" stroke="black" stroke-width="1" rx="3" ry="3"/>
  <text x="765" y="90" font-weight="bold" font-size="14">Output PWM</text>
  <text x="765" y="110" font-size="14">Freq 1/100 input clock</text>
  <text x="765" y="135" font-size="14">Duty cycle 25%</text>
</svg>